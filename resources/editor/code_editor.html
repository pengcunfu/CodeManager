<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>Code Editor</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #282a36;
        }
        #editor {
            position: absolute;
            inset: 0;
            font-size: 13px;
        }
    </style>
    <script src="ace/ace.js" charset="utf-8"></script>
    <script src="ace/ext-language_tools.js" charset="utf-8"></script>
</head>
<body>
    <div id="editor"></div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
    (function () {
        ace.config.set('basePath', 'ace');

        let bridge = null;
        let editor = null;
        let currentLanguage = 'python';

        const LANG_MODES = {
            python: 'ace/mode/python',
            javascript: 'ace/mode/javascript',
            js: 'ace/mode/javascript',
            typescript: 'ace/mode/typescript',
            ts: 'ace/mode/typescript',
            java: 'ace/mode/java',
            c: 'ace/mode/c_cpp',
            cpp: 'ace/mode/c_cpp',
            'c++': 'ace/mode/c_cpp',
            csharp: 'ace/mode/csharp',
            'c#': 'ace/mode/csharp',
            php: 'ace/mode/php',
            ruby: 'ace/mode/ruby',
            go: 'ace/mode/golang',
            rust: 'ace/mode/rust',
            swift: 'ace/mode/swift',
            kotlin: 'ace/mode/kotlin',
            scala: 'ace/mode/scala',
            r: 'ace/mode/r',
            perl: 'ace/mode/perl',
            lua: 'ace/mode/lua',
            shell: 'ace/mode/sh',
            bash: 'ace/mode/sh',
            sh: 'ace/mode/sh',
            powershell: 'ace/mode/powershell',
            batch: 'ace/mode/batchfile',
            bat: 'ace/mode/batchfile',
            html: 'ace/mode/html',
            htm: 'ace/mode/html',
            css: 'ace/mode/css',
            scss: 'ace/mode/scss',
            less: 'ace/mode/less',
            xml: 'ace/mode/xml',
            json: 'ace/mode/json',
            yaml: 'ace/mode/yaml',
            yml: 'ace/mode/yaml',
            sql: 'ace/mode/sql',
            dockerfile: 'ace/mode/dockerfile',
            markdown: 'ace/mode/markdown',
            md: 'ace/mode/markdown',
            text: 'ace/mode/plain_text',
            plaintext: 'ace/mode/plain_text',
        };

        function resolveMode(lang) {
            const key = (lang || 'text').toLowerCase();
            return LANG_MODES[key] || 'ace/mode/plain_text';
        }

        function initEditor() {
            editor = ace.edit('editor', {
                theme: 'ace/theme/dracula',
                mode: resolveMode(currentLanguage),
                fontSize: 13,
                fontFamily: '"Cascadia Code", "JetBrains Mono", Consolas, monospace',
                tabSize: 4,
                useSoftTabs: true,
                showPrintMargin: false,
                highlightActiveLine: true,
                showGutter: true,
                wrap: false,
                enableBasicAutocompletion: true,
                enableLiveAutocompletion: true,
                enableSnippets: false,
                scrollPastEnd: 0.2,
                animatedScroll: true,
                behavioursEnabled: true,
            });

            editor.session.setUseWorker(false);
            editor.setOption('enableMultiselect', true);

            editor.session.on('change', function () {
                if (bridge) {
                    bridge.on_code_changed(editor.getValue());
                }
            });

            editor.commands.addCommand({
                name: 'saveHint',
                bindKey: { win: 'Ctrl-S', mac: 'Command-S' },
                exec: function () { /* 由 Qt 快捷键处理 */ },
            });
        }

        function applyEditorConfig(cfg) {
            if (!editor || !cfg) return;

            const font = cfg.font || {};
            const behavior = cfg.behavior || {};

            if (font.size) editor.setFontSize(font.size);
            if (font.family) {
                editor.setOption('fontFamily', '"' + font.family + '", Consolas, monospace');
            }

            const tabSize = behavior.tab_size ?? 4;
            editor.session.setTabSize(tabSize);
            editor.setOption('useSoftTabs', behavior.use_spaces !== false);

            if (behavior.show_line_numbers !== undefined) {
                editor.setOption('showGutter', !!behavior.show_line_numbers);
            }
            if (behavior.highlight_current_line !== undefined) {
                editor.setOption('highlightActiveLine', !!behavior.highlight_current_line);
            }
            if (behavior.word_wrap !== undefined) {
                editor.session.setUseWrapMode(!!behavior.word_wrap);
            }
        }

        window.setCode = function (code) {
            if (!editor) return;
            const value = code == null ? '' : String(code);
            editor.session.setValue(value, -1);
            editor.clearSelection();
            editor.gotoLine(1, 0, false);
        };

        window.getCode = function () {
            return editor ? editor.getValue() : '';
        };

        window.setLanguage = function (lang) {
            currentLanguage = (lang || 'text').toLowerCase();
            if (editor) {
                editor.session.setMode(resolveMode(currentLanguage));
            }
        };

        window.applyConfig = applyEditorConfig;

        window.insertText = function (text) {
            if (!editor) return;
            editor.insert(text == null ? '' : String(text));
            editor.focus();
        };

        window.focus = function () {
            if (editor) editor.focus();
        };

        window.setPlaceholder = function () { /* Ace 无 placeholder，忽略 */ };

        initEditor();

        new QWebChannel(qt.webChannelTransport, function (channel) {
            bridge = channel.objects.bridge;
            if (window.__pendingConfig) {
                applyEditorConfig(window.__pendingConfig);
                delete window.__pendingConfig;
            }
            if (window.__pendingLanguage) {
                window.setLanguage(window.__pendingLanguage);
                delete window.__pendingLanguage;
            }
            if (window.__pendingCode !== undefined) {
                window.setCode(window.__pendingCode);
                delete window.__pendingCode;
            }
            if (editor && bridge) {
                bridge.on_code_changed(editor.getValue());
            }
        });
    })();
    </script>
</body>
</html>
