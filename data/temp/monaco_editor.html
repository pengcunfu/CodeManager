
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Code Editor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        #container {
            width: 100vw;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
        }
        #editor {
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: none;
            outline: none;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        .line-numbers {
            position: absolute;
            left: 0;
            top: 10px;
            width: 50px;
            background-color: #252526;
            color: #858585;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            text-align: right;
            padding-right: 10px;
            user-select: none;
            border-right: 1px solid #3e3e42;
        }
        #editor-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #editor-text {
            margin-left: 60px;
            width: calc(100% - 60px);
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="editor-container">
            <div class="line-numbers" id="line-numbers">1</div>
            <textarea id="editor" spellcheck="false" placeholder="在这里输入代码..."></textarea>
        </div>
    </div>
    
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    
    <script>
        let bridge;
        let editor = document.getElementById('editor');
        let lineNumbers = document.getElementById('line-numbers');
        
        // 初始化WebChannel
        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
            initializeEditor();
        });
        
        function initializeEditor() {
            // 监听内容变化
            editor.addEventListener('input', function() {
                updateLineNumbers();
                if (bridge) {
                    bridge.on_code_changed(editor.value);
                }
            });
            
            // 监听键盘事件
            editor.addEventListener('keydown', function(e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const start = editor.selectionStart;
                    const end = editor.selectionEnd;
                    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + 4;
                    updateLineNumbers();
                }
            });
            
            // 监听滚动事件
            editor.addEventListener('scroll', function() {
                lineNumbers.scrollTop = editor.scrollTop;
            });
            
            updateLineNumbers();
        }
        
        function updateLineNumbers() {
            const lines = editor.value.split('
');
            const lineCount = lines.length;
            let lineNumbersText = '';
            for (let i = 1; i <= lineCount; i++) {
                lineNumbersText += i + '
';
            }
            lineNumbers.textContent = lineNumbersText;
        }
        
        // 提供给Python调用的函数
        window.setCode = function(code) {
            if (editor) {
                editor.value = code;
                updateLineNumbers();
            }
        };
        
        window.setLanguage = function(language) {
            // 简化版本，不实现语法高亮
            console.log('Language set to:', language);
        };
        
        window.getCode = function() {
            return editor ? editor.value : '';
        };
        
        window.setTheme = function(theme) {
            console.log('Theme set to:', theme);
        };
        
        window.insertText = function(text) {
            if (editor) {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + text.length;
                updateLineNumbers();
            }
        };
        
        window.focus = function() {
            if (editor) {
                editor.focus();
            }
        };
    </script>
</body>
</html>
